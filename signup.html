<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join GamerFair</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#080810;font-family:'Segoe UI',Arial,sans-serif;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:28px;padding:48px;width:100%;max-width:440px;margin:20px;}
.logo{font-size:1.8rem;font-weight:900;text-align:center;margin-bottom:6px;cursor:pointer;background:linear-gradient(135deg,#00f5a0,#00d9f5,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.subtitle{text-align:center;color:#444;font-size:0.8rem;letter-spacing:2px;margin-bottom:36px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:0.75rem;font-weight:700;color:#555;letter-spacing:1px;margin-bottom:6px;}
.field input{width:100%;padding:12px 16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:#fff;font-size:0.9rem;outline:none;}
.field input:focus{border-color:#00f5a0;}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#00f5a0,#00d9f5);border:none;border-radius:50px;font-size:0.9rem;font-weight:900;color:#000;cursor:pointer;margin-top:8px;}
.btn:disabled{opacity:0.5;}
.link{text-align:center;margin-top:20px;font-size:0.75rem;color:#444;}
.link a{color:#00f5a0;text-decoration:none;font-weight:700;}
.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:10px;padding:10px 14px;font-size:0.78rem;color:#ef4444;margin-bottom:16px;display:none;}
.success{display:none;text-align:center;padding:20px;}
.success h2{font-size:1.5rem;font-weight:900;margin-bottom:8px;background:linear-gradient(135deg,#00f5a0,#00d9f5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.success p{color:#666;font-size:0.85rem;line-height:1.8;}
.safe{text-align:center;margin-top:20px;font-size:0.65rem;letter-spacing:2px;color:#333;}
</style>
</head>
<body>
<div class="card">
  <div class="logo" onclick="window.location.href='index.html'">🎮 GamerFair</div>
  <div class="subtitle">CREATE YOUR ACCOUNT</div>
  <div id="form">
    <div class="error" id="error"></div>
    <div class="field"><label>USERNAME</label><input type="text" id="username" placeholder="Pick your gamer tag"/></div>
    <div class="field"><label>PASSWORD</label><input type="password" id="password" placeholder="Make it strong!"/></div>
    <div class="field"><label>AGE</label><input type="number" id="age" min="4" max="17" placeholder="How old are you?"/></div>
    <button class="btn" id="btn" onclick="signup()">🎮 Create Account</button>
    <div class="link">Already have an account? <a href="login.html">Log in</a></div>
    <div class="safe">🛡️ NO EMAIL NEEDED · FREE FOREVER · SAFE</div>
  </div>
  <div class="success" id="success">
    <div style="font-size:3rem;margin-bottom:16px;">🎮</div>
    <h2>You're in!</h2>
    <p>Welcome to GamerFair!<br>Time to play some games.</p>
    <br>
    <button class="btn" onclick="window.location.href='index.html'">Start Playing →</button>
  </div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
const app = initializeApp({apiKey:"AIzaSyBF8NZvpjz8blZi4LL-Q7n-Q3Je73mZ5mo",authDomain:"kid-stock-7a377.firebaseapp.com",projectId:"kid-stock-7a377",storageBucket:"kid-stock-7a377.firebasestorage.app",messagingSenderId:"153069846242",appId:"1:153069846242:web:bdae0c7bb120e9245228bb"});
const auth = getAuth(app);
window.signup = async function() {
  const username=document.getElementById('username').value.trim();
  const password=document.getElementById('password').value;
  const age=parseInt(document.getElementById('age').value);
  const err=document.getElementById('error');
  const btn=document.getElementById('btn');
  err.style.display='none';
  if(!username||!password||!age){err.textContent='Fill in all fields!';err.style.display='block';return;}
  if(username.length<3){err.textContent='Username needs at least 3 characters!';err.style.display='block';return;}
  if(password.length<6){err.textContent='Password needs at least 6 characters!';err.style.display='block';return;}
  if(age<4||age>17){err.textContent='GamerFair is for kids ages 4-17!';err.style.display='block';return;}
  btn.disabled=true;btn.textContent='Creating account...';
  const fakeEmail=username.toLowerCase().replace(/[^a-z0-9]/g,'')+'@gamerfair.app';
  try{
    const cred=await createUserWithEmailAndPassword(auth,fakeEmail,password);
    await updateProfile(cred.user,{displayName:username});
    document.getElementById('form').style.display='none';
    document.getElementById('success').style.display='block';
  }catch(e){
    let msg='Something went wrong!';
    if(e.code==='auth/email-already-in-use')msg='That username is taken! Try another.';
    if(e.code==='auth/weak-password')msg='Password needs at least 6 characters!';
    err.textContent=msg;err.style.display='block';btn.disabled=false;btn.textContent='🎮 Create Account';
  }
};
</script>
</body>
</html>
